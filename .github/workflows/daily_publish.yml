name: Daily Generate and Publish

on:
  schedule:
    - cron: '0 9 * * *' # runs daily at 09:00 UTC — ajustar según necesidad
  workflow_dispatch: {}

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore YouTube secrets (if provided)
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YT_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          if [ -n "$YT_CLIENT_SECRETS" ]; then echo "$YT_CLIENT_SECRETS" > client_secrets.json; fi
          if [ -n "$YT_CREDENTIALS" ]; then echo "$YT_CREDENTIALS" > youtube_credentials.json; fi

      - name: Run generator and publish
        env:
          PUBLISH_TO_YOUTUBE: 'true'
        run: |
          python scripts/generate_media.py
